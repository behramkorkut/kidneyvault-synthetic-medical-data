name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qualite:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer uv (et le Python épinglé du projet)
        uses: astral-sh/setup-uv@v5

      - name: Installer les dépendances (lock file)
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        run: uv run pytest -v
